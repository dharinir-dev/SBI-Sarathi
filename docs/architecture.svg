<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="100%" style="background-color: #0a0f1d;">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="agent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="orch-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="cust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="rm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#06b6d4" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="620" fill="url(#bg-grad)" />
  <grid patternUnits="userSpaceOnUse" width="40" height="40">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  </grid>

  <!-- Header Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" letter-spacing="1">
    SBI SARATHI — MVP ARCHITECTURE
  </text>
  <text x="400" y="52" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="normal" fill="#64748b">
    Signal-Driven Orchestrated Conversational Banking Flow
  </text>

  <!-- Nodes (Boxes) -->

  <!-- 1. Synthetic Customer Dataset -->
  <g filter="url(#shadow)">
    <rect x="290" y="80" width="220" height="50" rx="10" fill="url(#db-grad)" stroke="#64748b" stroke-width="1.5" />
    <text x="400" y="105" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc">Synthetic Customer Dataset</text>
    <text x="400" y="120" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#94a3b8">80+ Customers (data/customers.json)</text>
  </g>

  <!-- 2. Signal Agent -->
  <g filter="url(#shadow)">
    <rect x="290" y="165" width="220" height="50" rx="10" fill="url(#agent-grad)" stroke="#06b6d4" stroke-width="1.5" />
    <text x="400" y="190" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Signal Agent</text>
    <text x="400" y="205" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#e0f7fa">Detects financial life events</text>
  </g>

  <!-- 3. Qualification Agent -->
  <g filter="url(#shadow)">
    <rect x="290" y="250" width="220" height="50" rx="10" fill="url(#agent-grad)" stroke="#06b6d4" stroke-width="1.5" />
    <text x="400" y="275" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Qualification Agent</text>
    <text x="400" y="290" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#e0f7fa">Logistic Regression Propensity Model</text>
  </g>

  <!-- 4. Conversation Agent -->
  <g filter="url(#shadow)">
    <rect x="290" y="335" width="220" height="50" rx="10" fill="url(#agent-grad)" stroke="#06b6d4" stroke-width="1.5" />
    <text x="400" y="360" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Conversation Agent</text>
    <text x="400" y="375" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#e0f7fa">Proactive System Prompt &amp; Memory State</text>
  </g>

  <!-- 5. Orchestrator (FastAPI app.py) -->
  <g filter="url(#shadow)">
    <rect x="270" y="425" width="260" height="60" rx="12" fill="url(#orch-grad)" stroke="#3b82f6" stroke-width="2" />
    <text x="400" y="453" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">GET /engage/{customer_id}</text>
    <text x="400" y="470" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" fill="#dbeafe">API Orchestration &amp; SQLite Memory Layer</text>
  </g>

  <!-- 6. Customer UI -->
  <g filter="url(#shadow)">
    <rect x="140" y="525" width="180" height="50" rx="10" fill="url(#cust-grad)" stroke="#10b981" stroke-width="1.5" />
    <text x="230" y="550" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Customer Simulation UI</text>
    <text x="230" y="563" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#d1fae5">Next.js Single-Page Dashboard</text>
  </g>

  <!-- 7. Relationship Manager -->
  <g filter="url(#shadow)">
    <rect x="480" y="525" width="180" height="50" rx="10" fill="url(#rm-grad)" stroke="#f43f5e" stroke-width="1.5" />
    <text x="570" y="550" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Relationship Manager (RM)</text>
    <text x="570" y="563" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="9" fill="#ffe4e6">Escalation Handoff (POST /escalate)</text>
  </g>

  <!-- Connector Lines & Arrows -->

  <!-- Dataset -> Signal Agent -->
  <line x1="400" y1="130" x2="400" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Signal Agent -> Qualification Agent -->
  <line x1="400" y1="215" x2="400" y2="250" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-cyan)" />

  <!-- Qualification Agent -> Conversation Agent -->
  <line x1="400" y1="300" x2="400" y2="335" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-cyan)" />

  <!-- Conversation Agent -> Orchestrator -->
  <line x1="400" y1="385" x2="400" y2="425" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Orchestrator -> Customer UI (Diagonal Down-Left) -->
  <path d="M 350 485 L 250 525" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="280" y="495" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#10b981" transform="rotate(-21, 280, 495)">Outreach / Reply</text>

  <!-- Orchestrator -> RM (Diagonal Down-Right) -->
  <path d="M 450 485 L 550 525" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="510" y="495" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#f43f5e" transform="rotate(21, 510, 495)">Handoff (Ticket)</text>

</svg>
